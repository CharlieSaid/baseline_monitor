name: Update Rates

on:
  schedule:
    # 8 AM ET = 13:00 UTC (adjust for DST as needed)
    - cron: "0 13 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Fetch current rates
        run: python fetch_rates.py

      - name: Commit updated rates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/rates.json
          # Only commit if rates actually changed
          git diff --cached --quiet || git commit -m "chore: update rates $(date -u +%Y-%m-%d)"
          git push
